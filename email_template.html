<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Seven Days — {{WEEK_LABEL}}</title>
  <!--[if mso]>
  <noscript>
    <xml>
      <o:OfficeDocumentSettings>
        <o:PixelsPerInch>96</o:PixelsPerInch>
      </o:OfficeDocumentSettings>
    </xml>
  </noscript>
  <![endif]-->
  <style>
    /* Reset */
    body, table, td, p, a, li { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
    table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
    img { -ms-interpolation-mode: bicubic; border: 0; outline: none; text-decoration: none; }
    body { margin: 0; padding: 0; width: 100% !important; height: 100% !important; }

    /* Base typography */
    body {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 17px;
      line-height: 1.65;
      color: #1a1a1a;
      background-color: #f4f1ec;
    }

    /* Container */
    .email-container {
      max-width: 640px;
      margin: 0 auto;
      background-color: #ffffff;
    }

    /* Header */
    .header {
      background-color: #0d1b2a;
      padding: 36px 40px 28px;
      text-align: center;
    }
    .header h1 {
      font-family: 'Georgia', serif;
      font-size: 36px;
      font-weight: 700;
      color: #ffffff;
      margin: 0 0 4px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .header .week-label {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 13px;
      color: #8b9bb4;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin: 0;
    }
    .header .divider-line {
      width: 60px;
      height: 2px;
      background-color: #c9a84c;
      margin: 16px auto 0;
    }

    /* Body content */
    .content {
      padding: 32px 40px;
    }

    /* Headings */
    .content h1 {
      font-family: Georgia, serif;
      font-size: 26px;
      font-weight: 700;
      color: #0d1b2a;
      margin: 32px 0 12px;
      line-height: 1.3;
      border-bottom: 2px solid #c9a84c;
      padding-bottom: 8px;
    }
    .content h1:first-child {
      margin-top: 0;
    }
    .content h2 {
      font-family: Georgia, serif;
      font-size: 21px;
      font-weight: 700;
      color: #0d1b2a;
      margin: 28px 0 10px;
      line-height: 1.3;
    }
    .content h3 {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: #415a77;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin: 20px 0 8px;
    }

    /* Paragraphs */
    .content p {
      margin: 0 0 16px;
      color: #1a1a1a;
    }

    /* Opening summary — italic lead */
    .content > p:first-child em,
    .content > p:first-of-type em {
      font-style: italic;
      color: #333;
      font-size: 17px;
      line-height: 1.7;
    }

    /* Bold text */
    .content strong {
      font-weight: 700;
      color: #0d1b2a;
    }

    /* Links */
    .content a {
      color: #1b4d89;
      text-decoration: underline;
    }

    /* Horizontal rules */
    .content hr {
      border: none;
      border-top: 1px solid #ddd;
      margin: 28px 0;
    }

    /* Tables (Data Snapshot) */
    .content table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0 24px;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 14px;
    }
    .content table th {
      background-color: #0d1b2a;
      color: #ffffff;
      font-weight: 600;
      text-align: left;
      padding: 10px 14px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .content table td {
      padding: 9px 14px;
      border-bottom: 1px solid #e8e8e8;
      color: #333;
    }
    .content table tr:nth-child(even) td {
      background-color: #f9f8f6;
    }

    /* Bullet lists */
    .content ul, .content ol {
      padding-left: 24px;
      margin: 0 0 16px;
    }
    .content li {
      margin-bottom: 6px;
    }

    /* Blockquotes (for pull quotes) */
    .content blockquote {
      border-left: 3px solid #c9a84c;
      margin: 20px 0;
      padding: 8px 0 8px 20px;
      font-style: italic;
      color: #555;
    }

    /* Footer */
    .footer {
      background-color: #0d1b2a;
      padding: 28px 40px;
      text-align: center;
    }
    .footer p {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 13px;
      color: #8b9bb4;
      margin: 0 0 8px;
      line-height: 1.5;
    }
    .footer .brand {
      font-family: Georgia, serif;
      font-size: 16px;
      color: #c9a84c;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }
    .footer a {
      color: #8b9bb4;
      text-decoration: underline;
    }

    /* Responsive */
    @media screen and (max-width: 680px) {
      .email-container { width: 100% !important; }
      .header { padding: 28px 24px 22px !important; }
      .header h1 { font-size: 28px !important; }
      .content { padding: 24px 24px !important; }
      .content h1 { font-size: 22px !important; }
      .content h2 { font-size: 19px !important; }
      .footer { padding: 24px 24px !important; }
      .content table { font-size: 13px !important; }
      .content table th, .content table td { padding: 7px 10px !important; }
    }
  </style>
</head>
<body style="margin:0; padding:0; background-color:#f4f1ec;">
  <center>
    <!-- Preheader (hidden) -->
    <div style="display:none; font-size:1px; color:#f4f1ec; line-height:1px; max-height:0px; max-width:0px; opacity:0; overflow:hidden;">
      Your weekly global news briefing — {{WEEK_LABEL}}
    </div>

    <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background-color:#f4f1ec;">
      <tr>
        <td style="padding: 20px 0;">
          <table class="email-container" role="presentation" cellspacing="0" cellpadding="0" border="0" width="640" align="center" style="background-color:#ffffff;">

            <!-- Header -->
            <tr>
              <td class="header">
                <h1>Seven Days</h1>
                <p class="week-label">{{WEEK_LABEL}}</p>
                <div class="divider-line"></div>
              </td>
            </tr>

            <!-- Body -->
            <tr>
              <td class="content">
                {{NEWSLETTER_BODY}}
              </td>
            </tr>

            <!-- Footer -->
            <tr>
              <td class="footer">
                <p class="brand">Seven Days</p>
                <p>Your weekly global briefing</p>
                <p style="margin-top: 16px; font-size: 11px;">
                  You received this because you subscribed to Seven Days.<br>
                  <a href="#">Unsubscribe</a> · <a href="#">View in browser</a>
                </p>
                <p style="font-size: 11px; color: #5a6a80;">&copy; {{YEAR}} Seven Days</p>
              </td>
            </tr>

          </table>
        </td>
      </tr>
    </table>
  </center>
</body>
</html>
